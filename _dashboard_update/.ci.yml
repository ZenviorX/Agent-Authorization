name: CI

on:
  push:
    branches:
      - main
      - improve-risk-policy
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  dashboard:
    name: Generate HTML test dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate numbered HTML dashboard
        run: |
          python tests/dashboard/generate_ci_dashboard.py

      - name: Upload latest dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-dashboard
          path: |
            Results/Result_*.html
            Results/Result_*.json

      - name: Commit dashboard result
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Results/Result_*.html Results/Result_*.json

          if git diff --cached --quiet; then
            echo "No dashboard result changes to commit."
          else
            git commit -m "chore: add CI dashboard result [skip ci]"
            git push
          fi
