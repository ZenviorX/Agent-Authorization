# ============================================================
# 12. 角色权限策略
# ============================================================
# 只保留 user 和 admin。
# 策略优先级：deny > confirm > allow。
#
# user：
# - 可以读取 public/course
# - 可以执行数据库查询，但危险 SQL 会被风险规则拦截
# - 写 public 文件、发邮件、删 public 文件需要确认
# - 禁止访问 secret/private/credentials/config 等敏感区域
# - 禁止写入或删除 course
# - 禁止 shell
#
# admin：
# - 可以访问更多资源
# - 删除文件和 shell 执行仍需人工确认
# - 禁止自动修改安全策略文件和 config/secrets
# - 高风险敏感路径会因为风险分转入确认或拒绝

roles:
  user:
    allow:
      - tool: file.read
        resource: public/*
      - tool: file.read
        resource: course/*
      - tool: db.query
        resource: "*"

    confirm:
      - tool: email.send
        resource: "*"
      - tool: file.write
        resource: public/*
      - tool: file.delete
        resource: public/*

    deny:
      - tool: "*"
        resource: secret/*
      - tool: "*"
        resource: secrets/*
      - tool: "*"
        resource: private/*
      - tool: "*"
        resource: credentials/*
      - tool: "*"
        resource: config/*
      - tool: "*"
        resource: config/secrets/*
      - tool: "*"
        resource: "*/config/*"
      - tool: "*"
        resource: "./config/*"
      - tool: "*"
        resource: "*.env"
      - tool: "*"
        resource: "*.env.*"
      - tool: "*"
        resource: ".env.*"
      - tool: "*"
        resource: "*/.env"
      - tool: "*"
        resource: "*/.env.*"
      - tool: "*"
        resource: "*credentials*"
      - tool: "*"
        resource: "*secrets*"
      - tool: "*"
        resource: "*.pem"
      - tool: "*"
        resource: "*.key"
      - tool: "*"
        resource: "*.p12"
      - tool: "*"
        resource: "*.pfx"
      - tool: file.write
        resource: course/*
      - tool: file.delete
        resource: course/*
      - tool: file.write
        resource: "*policy*"
      - tool: file.delete
        resource: "*policy*"
      - tool: shell.run
        resource: "*"

  admin:
    allow:
      - tool: file.read
        resource: "*"
      - tool: file.write
        resource: "*"
      - tool: email.send
        resource: "*"
      - tool: db.query
        resource: "*"

    confirm:
      - tool: file.delete
        resource: "*"
      - tool: shell.run
        resource: "*"

    deny:
      - tool: file.write
        resource: config/policy.yaml
      - tool: "*"
        resource: config/semantic_guard.yaml
      - tool: file.delete
        resource: config/policy.yaml
      - tool: file.write
        resource: config/semantic_guard.yaml
      - tool: file.delete
        resource: config/semantic_guard.yaml
      - tool: file.write
        resource: config/secrets/*
      - tool: file.delete
        resource: config/secrets/*
      - tool: file.write
        resource: "*/config/*"
      - tool: file.delete
        resource: "*/config/*"
      - tool: file.write
        resource: "./config/*"
      - tool: file.delete
        resource: "./config/*"
      - tool: file.write
        resource: "*secrets*"
      - tool: file.delete
        resource: "*secrets*"
      - tool: file.write
        resource: "*.env"
      - tool: file.delete
        resource: "*.env"
      - tool: file.write
        resource: "*.env.*"
      - tool: file.delete
        resource: "*.env.*"
      - tool: file.write
        resource: "*/.env"
      - tool: file.delete
        resource: "*/.env"
      - tool: file.write
        resource: "*/.env.*"
      - tool: file.delete
        resource: "*/.env.*"
      - tool: file.write
        resource: "*policy*"
      - tool: file.delete
        resource: "*policy*"

# ============================================================
# 13. 任务授权合约默认策略
# ============================================================
# 任务合约体现“任务级零信任”思想：
# 即使用户有权限，Agent 当前任务也必须被限制在任务边界内。

task_contract:
  default_denied_tools:
    - shell.run
    - file.delete
    - code.exec
    - http.request
    - browser.open
    - network.request
    - browser.upload
    - git.push
    - git.commit
    - package.install

  default_denied_paths:
    - secret/*
    - secrets/*
    - private/*
    - credentials/*
    - config/*
    - config/semantic_guard.yaml
    - config/secrets/*
    - ./config/*
    - "*/config/*"
    - "*/config/secrets/*"
    - ../*
    - ..\\*
    - .env
    - .env.*
    - "*/.env"
    - "*/.env.*"
    - "*/.ssh/*"
    - id_rsa
    - id_dsa
    - id_ed25519
    - id_ecdsa
    - "*id_rsa*"
    - "*id_ed25519*"
    - "*private_key*"
    - "*secret_key*"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - "*password*"
    - "*passwd*"
    - "*token*"
    - "*secret*"
    - "*credential*"
    - "*api_key*"
    - "*private_key*"

  default_risk_budget: 70
  default_allow_external_send: false
  default_require_human_confirm: false
