# AI Agent 工具调用授权策略配置文件
# 设计目标：
# 1. 所有 Agent 工具调用默认不可信
# 2. 普通操作自动放行，高风险操作人工确认，危险操作直接拒绝
# 3. 策略尽量配置化，减少业务代码硬编码
# 4. 只保留 user / admin 两类身份与角色，保证系统清晰易讲
#
# v4.2-policy-and-semantic-ready 说明：
# - 本版本只调整后端已支持读取的配置字段，不新增后端未知结构。
# - 强化路径穿越、敏感文件、Prompt Injection、Shell 高危命令、SQL 风险、邮件外发风险。
# - 增加 config/policy.yaml 保护，防止 Agent 自动修改安全策略。
# - 补齐 */config/*、*.env.*、*/.ssh/* 等 fnmatch 路径模式，减少绕过空间。
# - 增加 config/semantic_guard.yaml 保护，防止 Agent 篡改语义检测样例与阈值。

version: "4.2-policy-and-semantic-ready"

# ============================================================
# 1. 用户与角色映射
# ============================================================
# 系统只保留两个身份入口：
# - user：普通用户
# - admin：管理员
# 其他业务身份不进入策略层，避免权限来源混乱。

users:
  user: user
  admin: admin

# ============================================================
# 2. 系统支持的标准工具
# ============================================================
# Agent 或 LLM 不能临时创造未登记工具。
# 注意：只保留当前后端/执行器已支持的工具，不在 config 里擅自新增真实工具。

supported_tools:
  - file.read
  - file.write
  - file.delete
  - email.send
  - shell.run
  - db.query

# ============================================================
# 3. 每种工具必须具备的参数
# ============================================================

required_params:
  file.read:
    - path

  file.write:
    - path
    - content

  file.delete:
    - path

  email.send:
    - to
    - content

  shell.run:
    - command

  db.query:
    - sql

# ============================================================
# 4. Agent 计划质量阈值
# ============================================================
# agent_confidence < 0.60：直接拒绝
# 0.60 <= agent_confidence < 0.88：至少人工确认
# agent_confidence >= 0.88：进入正常风险评估

agent_plan:
  min_auto_confidence: 0.88
  min_confirm_confidence: 0.60

# ============================================================
# 5. 内部可信邮箱域名
# ============================================================

internal_email_domains:
  - "@sdu.edu.cn"
  - "@mail.sdu.edu.cn"
  - "@student.sdu.edu.cn"

# ============================================================
# 6. 工具基础风险分
# ============================================================
# 分数越高，越不可能自动执行。
# 这里只做小幅增强，避免正常演示场景大面积误拒绝。

tool_risk:
  file.read: 8
  file.write: 40
  file.delete: 80
  email.send: 50
  shell.run: 90
  db.query: 35

# ============================================================
# 7. 资源路径风险分
# ============================================================
# 当前代码是“路径子串命中”机制，所以关键词不要太泛。
# 例如 key 太容易误伤，建议用 .key、private_key、api_key 这类更具体的词。

resource_risk:
  public/: 0
  course/: 8
  data/: 10
  logs/: 15
  readonly/: 10

  private/: 45
  backup/: 40
  dump/: 60
  database/: 35
  users.db: 60
  db/: 35
  sqlite: 45

  secret/: 90
  secrets/: 90
  credentials/: 90
  config/secrets: 95
  config/secrets/: 95
  config/policy.yaml: 100
  policy.yaml: 85
  config/semantic_guard.yaml: 90
  semantic_guard.yaml: 80

  .env: 90
  .env.local: 90
  .env.development: 80
  .env.production: 95
  .env.prod: 95
  .env.dev: 80

  .ssh/: 90
  ssh/: 75
  authorized_keys: 85
  known_hosts: 60
  id_rsa: 90
  id_dsa: 90
  id_ed25519: 90
  id_ecdsa: 90

  private_key: 90
  public_key: 45
  secret_key: 90
  jwt_secret: 90
  client_secret: 90
  session_secret: 85
  cookie_secret: 85

  api_key: 85
  apikey: 85
  access_key: 85
  secret_access_key: 90
  aws_access_key_id: 85
  aws_secret_access_key: 90
  refresh_token: 85
  access_token: 85
  token: 80

  database_url: 85
  db_password: 90
  connection_string: 80
  password: 90
  passwd: 90

  .pem: 85
  .key: 80
  .p12: 85
  .pfx: 85
  .crt: 45
  .cer: 45

# ============================================================
# 8. 风险分决策阈值
# ============================================================
# <= 39：allow
# 40 - 79：confirm
# >= 80：deny

decision_threshold:
  allow_max: 39
  confirm_max: 79
  deny_min: 80

# ============================================================
# 9. 细粒度风险加分
# ============================================================
# v4-hardening 调整：
# - 路径穿越、危险命令、危险 SQL 更偏向直接拒绝。
# - Prompt Injection 和敏感内容外发风险提高到更容易触发人工确认或拒绝。

risk_scores:
  unknown_tool: 120

  low_confidence_deny: 100
  low_confidence_confirm: 45

  missing_params: 60

  path_traversal: 100
  absolute_path: 80

  role_deny: 90
  no_role_policy: 25

  missing_email_to: 35
  external_email: 45
  sensitive_email_content: 60

  prompt_injection_keyword: 55
  sensitive_content_keyword: 35

  command_keyword: 75

  sql_keyword: 80
  non_select_sql: 65

  contract_parse_error: 120

