  sensitive_path:
    - "secret"
    - "private"
    - "password"
    - "passwd"
    - "token"
    - ".env"
    - "credentials"
    - "id_rsa"
    - "id_dsa"
    - "private_key"
    - "api_key"
    - ".pem"
    - ".key"

  sql:
    - "drop table"
    - "delete from"
    - "truncate"
