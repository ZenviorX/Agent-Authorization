    - "del /s"
    - "format"
    - "shutdown"
    - "reboot"
    - "powershell"
    - "cmd.exe /c"
    - "curl"
    - "wget"
    - "nc "
    - "netcat"
    - "chmod 777"
    - "chown"
    - "sudo"
    - "su -"
    - "ssh "
