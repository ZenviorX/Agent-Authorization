# AI Agent 工具调用授权策略配置文件
# 设计目标：
# 1. 所有 Agent 工具调用默认不可信
# 2. 普通操作自动放行，高风险操作人工确认，危险操作直接拒绝
# 3. 策略尽量配置化，减少业务代码硬编码
# 4. 只保留 user / admin 两类角色，保证系统清晰易讲

version: "3.0"

# ============================================================
# 1. 用户与角色映射
# ============================================================

users:
  user: user
  student: user
  demo_user: user

  admin: admin
  root: admin
  demo_admin: admin

# ============================================================
# 2. 系统支持的标准工具
# ============================================================
# Agent 或 LLM 不能临时创造未登记工具。

supported_tools:
  - file.read
  - file.write
  - file.delete
  - email.send
  - shell.run
  - db.query

# ============================================================
# 3. 每种工具必须具备的参数
# ============================================================

required_params:
  file.read:
    - path

  file.write:
    - path
    - content

  file.delete:
    - path

  email.send:
    - to
    - content

  shell.run:
    - command

  db.query:
    - sql

# ============================================================
# 4. Agent 计划质量阈值
# ============================================================
# agent_confidence < 0.60：直接拒绝
# 0.60 <= agent_confidence < 0.88：至少人工确认
# agent_confidence >= 0.88：进入正常风险评估

agent_plan:
  min_auto_confidence: 0.88
  min_confirm_confidence: 0.60

# ============================================================
# 5. 内部可信邮箱域名
# ============================================================

internal_email_domains:
  - "@sdu.edu.cn"
  - "@mail.sdu.edu.cn"
  - "@student.sdu.edu.cn"

# ============================================================
# 6. 工具基础风险分
# ============================================================
# 分数越高，越不可能自动执行。

tool_risk:
  file.read: 8
  file.write: 35
  file.delete: 75
  email.send: 45
  shell.run: 85
  db.query: 35

# ============================================================
# 7. 资源路径风险分
# ============================================================
# 当前代码是“路径子串命中”机制，所以关键词不要太泛。
# 例如 key 太容易误伤，建议用 .key、private_key、api_key 这类更具体的词。

resource_risk:
  public/: 0
  course/: 8
  data/: 10
  logs/: 15
  readonly/: 10

  private/: 45
  backup/: 40
  dump/: 60
  database/: 35
  users.db: 60

  secret/: 90
  credentials/: 90
  config/secrets: 90
  .env: 90
  id_rsa: 90
  id_dsa: 90
  private_key: 90
  api_key: 85
  apikey: 85
  access_key: 85
  refresh_token: 85
  token: 80
  password: 90
  passwd: 90
  .pem: 80
  .key: 75

# ============================================================
# 8. 风险分决策阈值
# ============================================================
# <= 39：allow
# 40 - 79：confirm
# >= 80：deny

decision_threshold:
  allow_max: 39
  confirm_max: 79
  deny_min: 80

# ============================================================
# 9. 细粒度风险加分
# ============================================================

risk_scores:
  unknown_tool: 120

  low_confidence_deny: 100
  low_confidence_confirm: 45

  missing_params: 60

  path_traversal: 90
  absolute_path: 70

  role_deny: 90
  no_role_policy: 25

  missing_email_to: 35
  external_email: 35
  sensitive_email_content: 50

  prompt_injection_keyword: 40
  sensitive_content_keyword: 25

  command_keyword: 60

  sql_keyword: 70
  non_select_sql: 50

  contract_parse_error: 120

# ============================================================
# 10. 危险关键词配置
# ============================================================

dangerous_keywords:
  path:
    - "../"
    - "..\\"
    - "%2e%2e"
    - "%252e%252e"
    - "/etc/passwd"
    - "c:\\"
    - "c:/"
    - "\\windows\\"
    - "secret/"
    - "private/"
    - ".env"
    - "id_rsa"
    - "id_dsa"
    - "credentials"
    - "backup"
    - "dump"

  command:
