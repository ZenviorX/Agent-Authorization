# ============================================================
# 11. 可能造成数据外发或副作用的工具
# ============================================================

external_output_tools:
  - email.send
  - shell.run
  - db.query
  - file.write
  - file.delete

# ============================================================
# 12. 角色权限策略
# ============================================================
# 只保留 user 和 admin。
# 策略优先级：deny > confirm > allow。
#
# user：
# - 可以读取 public/course
# - 可以执行数据库查询，但危险 SQL 会被风险规则拦截
# - 写文件、发邮件、删 public 文件需要确认
# - 禁止访问 secret/private
# - 禁止 shell
#
# admin：
# - 可以访问更多资源
# - 删除文件和 shell 执行仍需人工确认
# - 高风险敏感路径会因为风险分转入确认或拒绝

roles:
  user:
    allow:
      - tool: file.read
        resource: public/*
      - tool: file.read
        resource: course/*
      - tool: db.query
        resource: "*"

    confirm:
      - tool: email.send
        resource: "*"
      - tool: file.write
        resource: public/*
      - tool: file.delete
        resource: public/*

    deny:
      - tool: "*"
        resource: secret/*
      - tool: "*"
        resource: private/*
      - tool: "*"
        resource: credentials/*
      - tool: file.write
        resource: course/*
      - tool: file.delete
        resource: course/*
      - tool: shell.run
        resource: "*"

  admin:
    allow:
      - tool: file.read
        resource: "*"
      - tool: file.write
        resource: "*"
      - tool: email.send
        resource: "*"
      - tool: db.query
        resource: "*"

    confirm:
      - tool: file.delete
        resource: "*"
      - tool: shell.run
        resource: "*"

    deny: []

# ============================================================
# 13. 任务授权合约默认策略
# ============================================================
# 任务合约体现“任务级零信任”思想：
# 即使用户有权限，Agent 当前任务也必须被限制在任务边界内。

task_contract:
  extract_file_path_pattern: '(public/[a-zA-Z0-9_.\-/]+|course/[a-zA-Z0-9_.\-/]+|data/[a-zA-Z0-9_.\-/]+|logs/[a-zA-Z0-9_.\-/]+|runtime_workspace/[a-zA-Z0-9_.\-/]+)'

  default_denied_tools:
    - shell.run
    - file.delete
    - code.exec
    - http.request
    - browser.open

  default_denied_paths:
    - secret/*
    - private/*
    - credentials/*
    - config/secrets/*
    - ../*
    - ..\\*
    - .env
    - id_rsa
    - id_dsa
    - "*.pem"
    - "*.key"

  default_risk_budget: 70
  default_allow_external_send: false
  default_require_human_confirm: false