name: CI

on:
  push:
    branches:
      - main
      - improve-risk-policy
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-and-frontend:
    name: Backend tests and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend authorization regression
        run: |
          python scripts/run_backend_authorization_tests.py

      - name: Run legacy independent test module
        run: |
          python -m test.run --case-dir test/cases --output-dir test/results

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          npm --prefix frontend install

      - name: Build frontend
        run: |
          npm --prefix frontend run build

      - name: Upload legacy test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-authorization-test-results
          path: |
            test/results/**
            Results/**
