name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test-frontend-build:
    name: Backend tests, gateway cases, and frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend authorization regression
        run: |
          python scripts/run_backend_authorization_tests.py

      - name: Run independent gateway test module
        run: |
          python -m test.run --case-dir test/cases --output-dir test/results

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentguard-test-results
          if-no-files-found: ignore
          path: |
            test/results/**
