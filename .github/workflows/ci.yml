name: CI

on:
  push:
    branches:
      - main
      - improve-risk-policy
  pull_request:
    branches:
      - main

jobs:
  dashboard:
    name: Generate HTML experiment dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate HTML dashboard
        run: |
          python experiments/runners/generate_ci_dashboard.py

      - name: Upload HTML dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-experiment-dashboard
          path: experiments/dashboards/ci_experiment_dashboard.html
