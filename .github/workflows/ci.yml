name: CI

on:
  push:
    branches:
      - main
      - improve-risk-policy
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic-test:
    name: Basic tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests -q

  dashboard:
    name: Generate dashboard report
    runs-on: ubuntu-latest
    needs: basic-test
    if: always()
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate numbered HTML dashboard
        run: |
          python tests/dashboard/generate_ci_dashboard.py

      - name: Upload latest dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-dashboard
          path: |
            Results/Result_*.html
            Results/Result_*.json
