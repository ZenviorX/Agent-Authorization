name: CI

on:
  push:
    branches:
      - main
      - improve-risk-policy
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run tests and security benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Run gateway security benchmark
        run: |
          python experiments/run_gateway_benchmark.py

      - name: Run attack-chain demo
        run: |
          python experiments/run_attack_chain_demo.py

      - name: Run attack-chain benchmark
        run: |
          python experiments/run_attack_chain_benchmark.py

      - name: Run comparison benchmark
        run: |
          python experiments/run_comparison_benchmark.py

      - name: Upload experiment reports
        uses: actions/upload-artifact@v4
        with:
          name: experiment-reports
          path: |
            experiments/gateway_benchmark_results.csv
            experiments/gateway_benchmark_report.md
            experiments/attack_chain_demo_result.json
            experiments/attack_chain_demo_report.md
            experiments/attack_chain_benchmark_results.csv
            experiments/attack_chain_benchmark_report.md
            experiments/comparison_benchmark_results.csv
            experiments/comparison_benchmark_report.md
