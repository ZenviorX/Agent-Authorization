x}.hero-main,.hero-side,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.hero-main{padding:26px}.hero-side{padding:20px}.eyebrow{color:var(--primary);font-size:13px;font-weight:900;margin-bottom:8px}h1{margin:0;font-size:32px;line-height:1.25}h2{margin:0;font-size:20px}h3{margin:0 0 10px;font-size:16px}.subtitle{margin:12px 0 0;color:var(--muted);line-height:1.7}.muted{color:var(--muted)}button,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:9px 14px;border-radius:8px;border:1px solid transparent;background:var(--primary);color:#fff;font-weight:900;font-size:14px;text-decoration:none;cursor:pointer}button.secondary,.btn.secondary{background:#fff;color:var(--primary);border-color:#c8d4ff}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.status-pill,.badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#eef2f8;color:var(--muted)}.ok,.badge.allow,.badge.pass{background:#e8f7ef;color:var(--green)}.warn,.badge.confirm{background:#fff4d8;color:var(--amber)}.bad,.badge.deny,.badge.fail{background:#ffecec;color:var(--red)}.panel{padding:18px;margin-bottom:16px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}.metric{padding:16px;background:#fff;border:1px solid var(--line);border-radius:8px}.metric-label{color:var(--muted);font-size:13px;margin-bottom:8px}.metric-value{font-size:28px;font-weight:900}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-size:13px;font-weight:900;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;font:inherit;background:#fff;color:var(--text)}textarea{min-height:110px;resize:vertical}.route-list{display:grid;gap:10px}.route-row{display:grid;grid-template-columns:120px minmax(0,1fr) 120px;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:8px}.empty,.notice{padding:14px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);background:#fafbff}.notice{border-style:solid;background:#fff4d8;color:#6f4b00;line-height:1.6}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}th{background:#eef3ff;color:#283654;font-size:13px}tr:last-child td{border-bottom:0}pre{margin:0;white-space:pre-wrap;word-break:break-word;max-height:360px;overflow:auto;padding:14px;border-radius:8px;background:#101828;color:#e4e7ec;font:12px/1.55 Consolas,Monaco,monospace}@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes pageOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}@keyframes navSlide{from{transform:scaleX(.25);opacity:.2}to{transform:scaleX(1);opacity:1}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}@media(max-width:980px){.top-nav{height:auto;min-height:64px;align-items:flex-start;flex-direction:column;padding:12px 18px}.brand,.transition-label{min-width:0}.nav-links{width:100%;justify-content:flex-start}.hero,.grid-2,.grid-3{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.page-shell{padding:18px 16px 34px}.metric-grid,.form-grid{grid-template-columns:1fr}.route-row{grid-template-columns:1fr}table{display:block;overflow-x:auto}}

const API_BASE=window.location.protocol==='file:'?'http://127.0.0.1:8000':window.location.origin;
function escapeHtml(value){return String(value??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}
function pretty(data){return JSON.stringify(data,null,2)}
function badge(text,type){return `<span class="badge ${escapeHtml(type||'')}">${escapeHtml(text||'-')}</span>`}
function pct(value){const n=Number(value);return Number.isFinite(n)?`${Math.round(n*1000)/10}%`:'-'}
async function fetchJson(path,options={}){const response=await fetch(`${API_BASE}${path}`,options);const text=await response.text();let data;try{data=text?JSON.parse(text):{}}catch(_){data={raw:text}}if(!response.ok)throw new Error(data.detail||data.message||text||`HTTP ${response.status}`);return data}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value??'-'}
function setHtml(id,value){const el=document.getElementById(id);if(el)el.innerHTML=value??''}
function setJson(id,value){const el=document.getElementById(id);if(el)el.textContent=pretty(value)}

function normalizeNavPath(path){
  if(!path) return "/";
  path = String(path).split("#")[0].split("?")[0];
  if(path.length > 1 && path.endsWith("/")) path = path.slice(0, -1);
  return path || "/";
}
function markActiveNav(){
  const current = normalizeNavPath(window.location.pathname);
  document.querySelectorAll(".nav-links a").forEach(link => {
    const href = normalizeNavPath(link.getAttribute("href") || "");
    link.classList.toggle("active", href === current);
  });
}
function bindPageTransitions(){
  document.querySelectorAll('.nav-links a[href^="/"], a.btn[href^="/"], a.button[href^="/"]').forEach(link => {
    if(link.dataset.navBound === "1") return;
    link.dataset.navBound = "1";
    link.addEventListener("click", event => {
      const href = link.getAttribute("href");
      if(!href) return;
      const target = normalizeNavPath(href);
      const current = normalizeNavPath(window.location.pathname);
      if(target === current || href.startsWith("/docs")) return;
      event.preventDefault();
      document.body.classList.add("page-leaving");
      setTimeout(() => { window.location.href = href; }, 170);
    });
  });
}
document.addEventListener("DOMContentLoaded", () => {
  markActiveNav();
  bindPageTransitions();
});
bindPageTransitions()});

        h3,

        }

        a {
            color: inherit;
            text-decoration: none;
        }

        }

        }

        }

        .info-name {
            padding: 10px 11px;
            background: var(--surface-soft);
            color: var(--text-subtle);
            font-size: var(--text-label-size);
            font-weight: var(--text-label-weight);
            line-height: var(--text-label-line);
        }

        .info-value {
            min-width: 0;
            padding: 10px 11px;
            background: #fff;
            color: var(--text);
            font-size: var(--text-body-size);
            font-weight: var(--text-body-weight);
            line-height: var(--text-body-line);
            word-break: break-word;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-body-size);
            line-height: var(--text-body-line);
        }

        th,
        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            background: var(--surface-soft);
            font-size: var(--text-label-size);
            font-weight: var(--text-label-weight);
            line-height: var(--text-label-line);
        }

        td {
            color: var(--text);
            font-size: var(--text-body-size);
            font-weight: var(--text-body-weight);
            line-height: var(--text-body-line);
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .path {
            font-family: Consolas, "Courier New", monospace;
            color: var(--text-subtle);
            word-break: break-all;
            font-size: var(--text-code-size);
            line-height: var(--text-code-line);
        }

        .hash-text {
            font-family: Consolas, "Courier New", monospace;
            font-size: var(--text-code-size);
            line-height: var(--text-code-line);
            word-break: break-all;
            color: var(--cyan);
        }

        .flow-list {
            border-top: 1px solid var(--line);
        }

        .flow-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--line-soft);
        }

        .flow-item:last-child {
            border-bottom: 0;
        }

        .flow-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .flow-title {
            color: var(--text-strong);
            font-size: var(--text-h3-size);
            font-weight: var(--text-h3-weight);
            line-height: var(--text-h3-line);
        }

        .flow-meta {
            margin: 5px 0;
            color: var(--muted);
            font-size: var(--text-caption-size);
            font-weight: var(--text-caption-weight);
            line-height: var(--text-caption-line);
        }

        .mail-content,
        .demo-result {
            margin-top: 8px;
            padding: 10px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid var(--line);
            white-space: pre-wrap;
            font-family: Consolas, "Courier New", monospace;
            font-size: var(--text-code-size);
            line-height: var(--text-code-line);
            max-height: 180px;
            overflow: auto;
        }

        pre {
            margin: 0;
            padding: 14px;
            border-radius: 14px;
            background: #0f172a;
            color: #dbeafe;
            overflow: auto;
            max-height: 620px;
            font-size: var(--text-code-size);
            line-height: var(--text-code-line);
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Microsoft YaHei", monospace;
        }

        .mini-button {
            padding: 7px 10px;
            font-size: 12px;
            border-radius: 9px;
        }

        .footer-note {
            color: var(--muted);
            font-size: var(--text-caption-size);
            font-weight: var(--text-caption-weight);
            line-height: var(--text-caption-line);
            margin-top: 12px;
        }

        @media (max-width: 1080px) {
            .controls {
                grid-template-columns: 1fr 1fr;
            }

            .api-input {
                grid-column: 1 / -1;
            }

            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 820px) {
            .topbar,
            .hero-title,
            .zone-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav {
                justify-content: flex-start;
                max-width: none;
            }

            .runtime-strip {
                grid-template-columns: 1fr 1fr;
            }

            .info-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .controls,
            .runtime-strip {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<div class="page">
    <header class="topbar">
        <div class="brand">
            <h1>AgentGuard 沙箱运行态展示</h1>
            <p>展示文件沙箱、邮件 outbox、SQLite 数据库、真实执行痕迹与 SHA256 证据包。</p>
        </div>

        <nav class="nav">
            <a href="/showcase">展示入口</a>
            <a href="/">单步网关</a>
            <a href="/task-chain">多步任务链</a>
            <a class="active" href="/sandbox-dashboard">沙箱运行态</a>
            <a href="/security-dashboard">安全总览</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-title">
            <div>
                <div class="eyebrow">Runtime Sandbox</div>
                <h2>安全沙箱 Runtime Workspace</h2>
                <p>
                    本页面用于比赛展示：Agent 的文件读写、邮件发送和数据库查询不再只是口头模拟，
                    而是在 <strong>runtime_workspace</strong> 中留下可验证的运行痕迹，并生成可复查的 SHA256 证据包。
                </p>
            </div>

            <div id="serverStatus" class="status">未检测</div>
        </div>

        <div class="controls">
            <input
                id="apiBase"
                class="api-input"
                value="http://127.0.0.1:8000"
                placeholder="后端地址，例如 http://127.0.0.1:8000"
            />

            <button onclick="checkServer()">检测后端</button>
            <button class="secondary" onclick="loadAll()">刷新全部</button>
            <button class="demo" onclick="runDemo()">一键生成演示痕迹</button>
            <button class="evidence" onclick="generateEvidence()">生成证据包</button>
            <button class="light" onclick="clearView()">清空页面</button>
        </div>

        <div class="footer-note">
            使用前请先启动后端：
            <span class="path">python -m uvicorn backend.main:app --reload --host 127.0.0.1 --port 8000</span>
        </div>
    </section>

    <section class="runtime-strip">
        <div class="runtime-cell">
            <div class="label">Public 文件</div>
            <div id="publicCount" class="value">-</div>
            <div class="hint">公开文件，可用于正常读取演示</div>
        </div>

        <div class="runtime-cell">
            <div class="label">Private 文件</div>
            <div id="privateCount" class="value">-</div>
            <div class="hint">内部文件，用于权限控制演示</div>
        </div>

        <div class="runtime-cell">
            <div class="label">Secret 文件</div>
            <div id="secretCount" class="value">-</div>
            <div class="hint">敏感文件，只展示文件名不展示内容</div>
        </div>

        <div class="runtime-cell">
            <div class="label">Outbox 邮件</div>
            <div id="outboxCount" class="value">-</div>
            <div class="hint">沙箱邮件落盘记录，未真实外发</div>
        </div>
    </section>

    <main class="layout">
        <section class="zone">
            <div class="zone-head">
                <div>
                    <h2 class="zone-title">执行证据流</h2>
                    <p class="zone-desc">展示演示步骤、证据包生成结果和哈希校验结果，突出“真实执行可复查”。</p>
                </div>
            </div>

            <div class="zone-body">
                <div class="section-block">
                    <div class="section-title-row">
                        <h3>证据包生成结果</h3>
                        <span class="endpoint">/sandbox-evidence/run</span>
                    </div>

                    <div id="evidenceView" class="empty">
                        点击“生成证据包”后，这里会展示证据文件、SHA256 和执行摘要。
                    </div>
                </div>

                <div class="section-block">
                    <div class="section-title-row">
                        <h3>一键演示执行结果</h3>
                        <span class="endpoint">/runtime/sandbox/demo-run</span>
                    </div>

                    <div id="demoView" class="empty">
                        点击“一键生成演示痕迹”后，这里会展示每一步真实沙箱执行结果。
                    </div>
                </div>
            </div>
        </section>

        <section class="zone">
            <div class="zone-head">
                <div>
                    <h2 class="zone-title">沙箱边界状态</h2>
                    <p class="zone-desc">用标签页集中展示目录、文件、数据库、outbox、证据包列表和原始 JSON。</p>
                </div>
            </div>

            <div class="zone-body">
                <div class="tabs">
                    <button class="tab active" onclick="switchPanel('status', this)">目录状态</button>
                    <button class="tab" onclick="switchPanel('files', this)">文件边界</button>
                    <button class="tab" onclick="switchPanel('database', this)">数据库</button>
                    <button class="tab" onclick="switchPanel('outbox', this)">Outbox</button>
                    <button class="tab" onclick="switchPanel('evidence', this)">证据包</button>
                    <button class="tab" onclick="switchPanel('raw', this)">原始 JSON</button>
                </div>

                <div id="panel-status" class="panel active">
                    <div id="statusView" class="empty">暂无数据，请点击“刷新全部”。</div>
                </div>

                <div id="panel-files" class="panel">
                    <div id="filesView" class="empty">暂无数据，请点击“刷新全部”。</div>
                </div>

                <div id="panel-database" class="panel">
                    <div id="databaseView" class="empty">暂无数据，请点击“刷新全部”。</div>
                </div>

                <div id="panel-outbox" class="panel">
                    <div id="outboxView" class="empty">
                        暂无邮件。你可以点击“一键生成演示痕迹”，再查看 outbox 记录。
                    </div>
                </div>

                <div id="panel-evidence" class="panel">
                    <div id="evidenceListView" class="empty">
                        暂无证据包。点击“生成证据包”后会自动刷新。
                    </div>
                </div>

                <div id="panel-raw" class="panel">
                    <pre id="rawView">暂无数据</pre>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    function getApiBase() {
        return document.getElementById("apiBase").value.trim().replace(/\/$/, "");
    }

    function switchPanel(name, button) {
        document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));

        document.getElementById(`panel-${name}`).classList.add("active");
        button.classList.add("active");
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function formatJson(data) {
        return JSON.stringify(data, null, 2);
    }

    async function fetchJson(path) {
        const response = await fetch(`${getApiBase()}${path}`);
        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.detail || data.message || "后端接口响应异常");
        }

        return data;
    }

    async function checkServer() {
        const serverStatus = document.getElementById("serverStatus");

        serverStatus.textContent = "检测中...";
        serverStatus.className = "status";

        try {
            await fetchJson("/api/status");
            serverStatus.textContent = "后端运行正常";
            serverStatus.className = "status ok";
        } catch (error) {
            serverStatus.textContent = "后端未连接";
            serverStatus.className = "status bad";
        }
    }

    async function generateEvidence() {
        const evidenceView = document.getElementById("evidenceView");

        evidenceView.className = "empty";
        evidenceView.textContent = "正在生成证据包，请稍候...";

        try {
            const evidenceResult = await fetchJson("/sandbox-evidence/run");

            renderEvidenceResult(evidenceResult);
            document.getElementById("rawView").textContent = formatJson(evidenceResult);

            await loadEvidenceList();
            await loadAll(false);
        } catch (error) {
            renderError("evidenceView", error);
        }
    }

    async function loadEvidenceList() {
        try {
            const list = await fetchJson("/sandbox-evidence/list");
            renderEvidenceList(list);
        } catch (error) {
            renderError("evidenceListView", error);
        }
    }

    async function readEvidence(fileName) {
        try {
            const data = await fetchJson(`/sandbox-evidence/read/${encodeURIComponent(fileName)}`);

            renderEvidenceReadResult(data);
            document.getElementById("rawView").textContent = formatJson(data);
        } catch (error) {
            renderError("evidenceView", error);
        }
    }

    async function runDemo() {
        const demoView = document.getElementById("demoView");

        demoView.className = "empty";
        demoView.textContent = "正在执行沙箱演示，请稍候...";

        try {
            const demo = await fetchJson("/runtime/sandbox/demo-run");

            renderDemo(demo);
            document.getElementById("rawView").textContent = formatJson(demo);

            await loadAll(false);
        } catch (error) {
            renderError("demoView", error);
        }
    }

    async function loadAll(updateRaw = true) {
        await checkServer();

        const raw = {};

        try {
            const status = await fetchJson("/runtime/sandbox/status");

            raw.status = status;
            renderStatus(status);
            renderMetrics(status);
        } catch (error) {
            renderError("statusView", error);
        }

        try {
            const files = await fetchJson("/runtime/sandbox/files");

            raw.files = files;
            renderFiles(files);
        } catch (error) {
            renderError("filesView", error);
        }

        try {
            const outbox = await fetchJson("/runtime/sandbox/outbox");

            raw.outbox = outbox;
            renderOutbox(outbox);
        } catch (error) {
            renderError("outboxView", error);
        }

        try {
            const database = await fetchJson("/runtime/sandbox/database");

            raw.database = database;
            renderDatabase(database);
        } catch (error) {
            renderError("databaseView", error);
        }

        try {
            const evidenceList = await fetchJson("/sandbox-evidence/list");

            raw.evidence_list = evidenceList;
            renderEvidenceList(evidenceList);
        } catch (error) {
            renderError("evidenceListView", error);
        }

        if (updateRaw) {
            document.getElementById("rawView").textContent = formatJson(raw);
        }
    }

    function renderMetrics(status) {
        const counts = status.counts || {};

        document.getElementById("publicCount").textContent = counts.public_files ?? "-";
        document.getElementById("privateCount").textContent = counts.private_files ?? "-";
        document.getElementById("secretCount").textContent = counts.secret_files ?? "-";
        document.getElementById("outboxCount").textContent = counts.outbox_emails ?? "-";
    }

    function renderInfoTable(rows) {
        return `
            <div class="info-table">
                ${rows.map(row => `
                    <div class="info-row">
                        <div class="info-name">${escapeHtml(row.name)}</div>
                        <div class="info-value">${row.html}</div>
                    </div>
                `).join("")}
            </div>
        `;
    }

    function renderEvidenceResult(evidenceResult) {
        const evidence = evidenceResult.evidence || {};
        const summary = evidence.summary || {};
        const file = evidenceResult.file || "-";
        const sha256 = evidenceResult.sha256 || evidence.sha256 || "-";

        document.getElementById("evidenceView").className = "";
        document.getElementById("evidenceView").innerHTML = renderInfoTable([
            {
                name: "证据状态",
                html: "<span class='tag verified'>已保存</span>"
            },
            {
                name: "证据文件",
                html: `<span class="path">${escapeHtml(file)}</span>`
            },
            {
                name: "SHA256",
                html: `<div class="hash-text">${escapeHtml(sha256)}</div>`
            },
            {
                name: "执行摘要",
                html: `
                    共 ${escapeHtml(summary.total_steps ?? "-")} 步，
                    成功 ${escapeHtml(summary.success_steps ?? "-")} 步，
                    拦截 ${escapeHtml(summary.blocked_steps ?? "-")} 步。
                `
            },
            {
                name: "说明",
                html: "该证据包记录了工具、参数、执行结果和拦截情况，可用于答辩复查。"
            }
        ]);
    }

    function renderEvidenceReadResult(data) {
        const evidence = data.evidence || {};
        const summary = evidence.summary || {};

        document.getElementById("evidenceView").className = "";
        document.getElementById("evidenceView").innerHTML = renderInfoTable([
            {
                name: "校验结果",
                html: data.hash_verified
                    ? "<span class='tag verified'>哈希校验通过</span>"
                    : "<span class='tag unverified'>哈希校验失败</span>"
            },
            {
                name: "证据文件",
                html: `<span class="path">${escapeHtml(data.file || "-")}</span>`
            },
            {
                name: "文件内 SHA256",
                html: `<div class="hash-text">${escapeHtml(data.sha256_in_file || "-")}</div>`
            },
            {
                name: "重新计算 SHA256",
                html: `<div class="hash-text">${escapeHtml(data.sha256_recomputed || "-")}</div>`
            },
            {
                name: "执行摘要",
                html: `
                    共 ${escapeHtml(summary.total_steps ?? "-")} 步，
                    成功 ${escapeHtml(summary.success_steps ?? "-")} 步，
                    拦截 ${escapeHtml(summary.blocked_steps ?? "-")} 步。
                `
            }
        ]);
    }

    function renderEvidenceList(list) {
        const files = list.files || [];

        if (files.length === 0) {
            document.getElementById("evidenceListView").className = "empty";
            document.getElementById("evidenceListView").innerHTML = "暂无证据包。点击“生成证据包”后会自动刷新。";
            return;
        }

        document.getElementById("evidenceListView").className = "";
        document.getElementById("evidenceListView").innerHTML = `
            <div class="flow-list">
                ${files.map(file => {
                    const summary = file.summary || {};

                    return `
                        <div class="flow-item">
                            <div class="flow-head">
                                <div class="flow-title">${escapeHtml(file.name)}</div>
                                <button class="mini-button evidence" onclick="readEvidence('${escapeHtml(file.name)}')">校验</button>
                            </div>

                            <p class="flow-meta">
                                路径：<span class="path">${escapeHtml(file.relative_path)}</span>
                            </p>

                            <p class="flow-meta">
                                创建时间：${escapeHtml(file.created_at || "-")}
                            </p>

                            <p class="flow-meta">
                                摘要：共 ${escapeHtml(summary.total_steps ?? "-")} 步，
                                成功 ${escapeHtml(summary.success_steps ?? "-")} 步，
                                拦截 ${escapeHtml(summary.blocked_steps ?? "-")} 步。
                            </p>

                            <div class="hash-text">${escapeHtml(file.sha256 || "-")}</div>
                        </div>
                    `;
                }).join("")}
            </div>
        `;
    }

    function renderDemo(demo) {
        const steps = demo.steps || [];
        const summary = demo.summary || {};

        const summaryHtml = `
            <div class="empty" style="margin-bottom: 12px;">
                共执行 ${escapeHtml(summary.total_steps ?? steps.length)} 步，
                成功 ${escapeHtml(summary.success_steps ?? "-")} 步，
                拦截 ${escapeHtml(summary.blocked_steps ?? "-")} 步。
                其中拦截步骤用于证明沙箱能阻止越界访问。
            </div>
        `;

        const stepsHtml = `
            <div class="flow-list">
                ${steps.map((step, index) => {
                    const result = step.result || {};
                    const success = result.success === true;

                    return `
                        <div class="flow-item">
                            <div class="flow-head">
                                <div class="flow-title">Step ${index + 1}：${escapeHtml(step.name)}</div>
                                ${success
                                    ? "<span class='tag success'>执行成功</span>"
                                    : "<span class='tag blocked'>已拦截</span>"
                                }
                            </div>

                            <p class="flow-meta">
                                工具：<span class="path">${escapeHtml(step.tool)}</span>
                            </p>

                            <p class="flow-meta">
                                参数：<span class="path">${escapeHtml(JSON.stringify(step.params || {}))}</span>
                            </p>

                            <div class="demo-result">${escapeHtml(JSON.stringify(result, null, 2))}</div>
                        </div>
                    `;
                }).join("")}
            </div>
        `;

        document.getElementById("demoView").className = "";
        document.getElementById("demoView").innerHTML = summaryHtml + stepsHtml;
    }

    function renderStatus(status) {
        const sandbox = status.sandbox || {};
        const exists = status.exists || {};

        document.getElementById("statusView").className = "";
        document.getElementById("statusView").innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>项目</th>
                        <th>状态</th>
                        <th>路径</th>
                    </tr>
                </thead>

                <tbody>
                    ${statusRow("沙箱根目录", exists.root, sandbox.root)}
                    ${statusRow("public 目录", exists.public_dir, sandbox.public_dir)}
                    ${statusRow("private 目录", exists.private_dir, sandbox.private_dir)}
                    ${statusRow("secret 目录", exists.secret_dir, sandbox.secret_dir)}
                    ${statusRow("outbox 目录", exists.outbox_dir, sandbox.outbox_dir)}
                    ${statusRow("SQLite 数据库", exists.database, sandbox.database)}
                </tbody>
            </table>
        `;
    }

    function statusRow(name, ok, path) {
        return `
            <tr>
                <td>${escapeHtml(name)}</td>
                <td>${ok ? "<span class='tag public'>存在</span>" : "<span class='tag secret'>缺失</span>"}</td>
                <td class="path">${escapeHtml(path || "")}</td>
            </tr>
        `;
    }

    function renderFiles(files) {
        const groups = [
            ["public", "公开文件", files.public || []],
            ["private", "内部文件", files.private || []],
            ["secret", "敏感文件", files.secret || []],
            ["outbox", "邮件记录", files.outbox || []],
        ];

        const rows = [];

        for (const [type, label, list] of groups) {
            for (const file of list) {
                rows.push(`
                    <tr>
                        <td><span class="tag ${type}">${escapeHtml(label)}</span></td>
                        <td>${escapeHtml(file.name)}</td>
                        <td class="path">${escapeHtml(file.relative_path)}</td>
                        <td>${escapeHtml(file.size)} B</td>
                    </tr>
                `);
            }
        }

        if (rows.length === 0) {
            document.getElementById("filesView").className = "empty";
            document.getElementById("filesView").innerHTML = "沙箱中暂无文件。";
            return;
        }

        document.getElementById("filesView").className = "";
        document.getElementById("filesView").innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>类型</th>
                        <th>文件名</th>
                        <th>相对路径</th>
                        <th>大小</th>
                    </tr>
                </thead>

                <tbody>
                    ${rows.join("")}
                </tbody>
            </table>
        `;
    }

    function renderOutbox(outbox) {
        const emails = outbox.emails || [];

        document.getElementById("outboxCount").textContent = outbox.count ?? emails.length;

        if (emails.length === 0) {
            document.getElementById("outboxView").className = "empty";
            document.getElementById("outboxView").innerHTML = `
                暂无邮件。你可以点击“一键生成演示痕迹”，再查看 outbox 记录。
            `;
            return;
        }

        document.getElementById("outboxView").className = "";
        document.getElementById("outboxView").innerHTML = `
            <div class="flow-list">
                ${emails.map(email => {
                    const data = email.data || {};

                    return `
                        <div class="flow-item">
                            <div class="flow-head">
                                <div class="flow-title">${escapeHtml(data.subject || "无主题邮件")}</div>
                                ${data.real_external_send
                                    ? "<span class='tag secret'>真实外发</span>"
                                    : "<span class='tag public'>沙箱接管</span>"
                                }
                            </div>

                            <p class="flow-meta">
                                文件：<span class="path">${escapeHtml(email.file)}</span>
                            </p>

                            <p class="flow-meta">
                                收件人：${escapeHtml(data.to || "")}
                            </p>

                            <p class="flow-meta">
                                创建时间：${escapeHtml(data.created_at || "")}
                            </p>

                            <div class="mail-content">${escapeHtml(data.content || "")}</div>
                        </div>
                    `;
                }).join("")}
            </div>
        `;
    }

    function renderDatabase(database) {
        const rows = database.rows || [];

        if (rows.length === 0) {
            document.getElementById("databaseView").className = "empty";
            document.getElementById("databaseView").innerHTML = "数据库暂无记录。";
            return;
        }

        document.getElementById("databaseView").className = "";
        document.getElementById("databaseView").innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>内容</th>
                        <th>可见性</th>
                    </tr>
                </thead>

                <tbody>
                    ${rows.map(row => `
                        <tr>
                            <td>${escapeHtml(row.id)}</td>
                            <td>${escapeHtml(row.title)}</td>
                            <td>${escapeHtml(row.content)}</td>
                            <td><span class="tag ${getVisibilityClass(row.visibility)}">${escapeHtml(row.visibility)}</span></td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `;
    }

    function getVisibilityClass(visibility) {
        const value = String(visibility || "").toLowerCase();

        if (value.includes("public")) {
            return "public";
        }

        if (value.includes("secret")) {
            return "secret";
        }

        return "private";
    }

    function renderError(elementId, error) {
        document.getElementById(elementId).className = "empty";
        document.getElementById(elementId).innerHTML = `
            加载失败：${escapeHtml(error)}
        `;
    }

    function clearView() {
        document.getElementById("publicCount").textContent = "-";
        document.getElementById("privateCount").textContent = "-";
        document.getElementById("secretCount").textContent = "-";
        document.getElementById("outboxCount").textContent = "-";

        document.getElementById("evidenceView").innerHTML = "点击“生成证据包”后，这里会展示证据文件、SHA256 和执行摘要。";
        document.getElementById("evidenceView").className = "empty";

        document.getElementById("evidenceListView").innerHTML = "暂无证据包。点击“生成证据包”后会自动刷新。";
        document.getElementById("evidenceListView").className = "empty";

        document.getElementById("demoView").innerHTML = "点击“一键生成演示痕迹”后，这里会展示每一步真实沙箱执行结果。";
        document.getElementById("demoView").className = "empty";

        document.getElementById("statusView").innerHTML = "暂无数据，请点击“刷新全部”。";
        document.getElementById("statusView").className = "empty";

        document.getElementById("filesView").innerHTML = "暂无数据，请点击“刷新全部”。";
        document.getElementById("filesView").className = "empty";

        document.getElementById("outboxView").innerHTML = "暂无邮件。你可以点击“一键生成演示痕迹”，再查看 outbox 记录。";
        document.getElementById("outboxView").className = "empty";

        document.getElementById("databaseView").innerHTML = "暂无数据，请点击“刷新全部”。";
        document.getElementById("databaseView").className = "empty";

        document.getElementById("rawView").textContent = "暂无数据";
    }

    checkServer();
    loadEvidenceList();
</script>
</body>
</html>
