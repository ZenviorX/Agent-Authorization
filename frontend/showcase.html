<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AgentGuard 系统总览</title>
<style>
:root{
  --bg:#f4f7fb;--panel:#ffffff;--panel-soft:#f8fbff;--text:#101828;--muted:#667085;
  --line:#d9e2ef;--primary:#245bdb;--primary-2:#1747b5;--primary-soft:#eaf0ff;
  --green:#087443;--green-soft:#e8f7ef;--red:#b42318;--red-soft:#ffecec;
  --amber:#a86500;--amber-soft:#fff4d8;--shadow:0 18px 45px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--text);background:linear-gradient(180deg,#f7faff 0,#f4f7fb 55%,#eef3f9 100%);letter-spacing:0}
.top-nav{position:sticky;top:0;z-index:80;height:66px;display:flex;align-items:center;gap:18px;padding:0 28px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(16,24,40,.04)}
.brand{display:flex;align-items:center;gap:10px;min-width:210px;font-weight:900;white-space:nowrap;color:#18233f}.brand-mark{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--primary);color:#fff;box-shadow:0 8px 18px rgba(36,91,219,.28)}
.nav-links{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;min-width:0;overflow-x:auto;scrollbar-width:thin}.nav-links a{position:relative;flex:0 0 auto;padding:9px 11px;border-radius:9px;color:#5d6b82;text-decoration:none;font-size:14px;font-weight:900;transition:background .18s ease,color .18s ease,transform .18s ease}.nav-links a:hover{color:var(--primary);background:var(--primary-soft);transform:translateY(-1px)}.nav-links a.active{color:#fff;background:var(--primary)}.nav-links a.active:after{content:"";position:absolute;left:12px;right:12px;bottom:-14px;height:3px;border-radius:999px;background:var(--primary);animation:navSlide .36s ease both}
.nav-status{min-width:190px;display:flex;align-items:center;justify-content:flex-end;gap:8px;white-space:nowrap}.nav-status-pill{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid transparent}.nav-ok{color:var(--green);background:var(--green-soft);border-color:#b7ebcf}.nav-warn{color:var(--amber);background:var(--amber-soft);border-color:#ffe0a3}.nav-bad{color:var(--red);background:var(--red-soft);border-color:#ffc9c9}.nav-check-btn{min-height:30px;padding:5px 10px;border-radius:999px;border:1px solid #c8d4ff;background:#fff;color:var(--primary);font-size:12px;font-weight:900;cursor:pointer}.nav-check-btn:hover{background:var(--primary-soft)}
.page-shell{max-width:1280px;margin:0 auto;padding:28px 28px 54px;animation:pageIn .25s ease both}.hero{display:grid;grid-template-columns:minmax(0,1fr);gap:18px;margin-bottom:18px}.hero-main,.panel{background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.hero-main{padding:28px}.eyebrow{color:var(--primary);font-size:13px;font-weight:900;margin-bottom:8px;letter-spacing:.02em}h1{margin:0;font-size:34px;line-height:1.22;color:#13203a}h2{margin:0 0 14px;font-size:20px;color:#13203a}h3{margin:0 0 10px;font-size:16px}.subtitle{margin:12px 0 0;color:var(--muted);line-height:1.75}.muted{color:var(--muted)}
.panel{padding:20px;margin-bottom:16px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}.metric{padding:17px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 28px rgba(16,24,40,.05)}.metric-label{color:var(--muted);font-size:13px;margin-bottom:8px}.metric-value{font-size:28px;font-weight:900;color:#12203b}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.form-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}label{display:block;font-size:13px;font-weight:900;margin-bottom:6px;color:#26344f}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;background:#fff;color:var(--text);outline:none}textarea{min-height:110px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(36,91,219,.12)}button,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:9px 15px;border-radius:12px;border:1px solid transparent;background:var(--primary);color:#fff;font-weight:900;font-size:14px;text-decoration:none;cursor:pointer;transition:transform .16s ease,background .16s ease,box-shadow .16s ease}button:hover,.btn:hover{background:var(--primary-2);transform:translateY(-1px);box-shadow:0 8px 18px rgba(36,91,219,.18)}button.secondary,.btn.secondary{background:#fff;color:var(--primary);border-color:#c8d4ff}button.secondary:hover,.btn.secondary:hover{background:var(--primary-soft)}button.danger{background:var(--red)}button.danger:hover{background:#971b12}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.status-pill,.badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#eef2f8;color:var(--muted)}.ok,.badge.allow,.badge.pass{background:var(--green-soft);color:var(--green)}.warn,.badge.confirm{background:var(--amber-soft);color:var(--amber)}.bad,.badge.deny,.badge.fail{background:var(--red-soft);color:var(--red)}.route-list{display:grid;gap:10px}.route-row{display:grid;grid-template-columns:150px minmax(0,1fr) 140px;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff}.list-row{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:10px}.empty,.notice{padding:14px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);background:#fafbff}.notice{border-style:solid;background:#fffdf5;color:#694100;line-height:1.65}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}th{background:#eef3ff;color:#283654;font-size:13px}tr:last-child td{border-bottom:0}pre{margin:0;white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto;padding:14px;border-radius:14px;background:#101828;color:#e4e7ec;font:12px/1.55 Consolas,Monaco,monospace}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px}.tab-btn{background:#fff;color:#526176;border-color:#d4ddeb}.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.tab-panel{display:none}.tab-panel.active{display:block}.hidden-marker{display:none!important}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes navSlide{from{transform:scaleX(.25);opacity:.2}to{transform:scaleX(1);opacity:1}}
@media(max-width:1100px){.top-nav{height:auto;min-height:66px;align-items:flex-start;flex-direction:column;padding:12px 18px}.brand,.nav-status{min-width:0}.nav-links{width:100%;justify-content:flex-start}.grid-2,.grid-3{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.route-row{grid-template-columns:1fr}}@media(max-width:640px){.page-shell{padding:18px 14px 34px}.metric-grid,.form-grid,.form-grid-3{grid-template-columns:1fr}table{display:block;overflow-x:auto}}
</style>
</head>
<body>

<nav class="top-nav"><div class="brand"><div class="brand-mark">AG</div><span>AgentGuard 安全网关</span></div><div class="nav-links"><a href="/showcase">系统总览</a><a href="/">单步授权</a><a href="/tool-proxy">工具接入</a><a href="/task-chain">任务链</a><a href="/attack-chain-runtime">攻击链检测</a><a href="/sandbox-dashboard">沙箱运行</a><a href="/authorized-evidence">授权证据</a><a href="/benchmark-dashboard">评测中心</a><a href="/security-dashboard">安全中心</a><a href="/docs">API 文档</a></div><div class="nav-status"><span id="globalBackendStatus" class="nav-status-pill nav-warn">后端检测中</span><button class="nav-check-btn" type="button" onclick="checkBackendFromNav()">检测</button></div></nav>
<main class="page-shell">
  <section class="hero"><div class="hero-main"><div class="eyebrow">System Overview</div><h1>系统总览</h1><p class="subtitle">集中查看安全网关运行状态、核心能力、评测结果、审计链和系统报告。</p></div></section>
  
<section class="metric-grid"><div class="metric"><div class="metric-label">服务版本</div><div id="version" class="metric-value">-</div></div><div class="metric"><div class="metric-label">安全样例</div><div id="caseCount" class="metric-value">-</div></div><div class="metric"><div class="metric-label">评测通过率</div><div id="passRate" class="metric-value">-</div></div><div class="metric"><div class="metric-label">审计链</div><div id="auditState" class="metric-value">-</div></div></section>
<section class="grid-2"><div class="panel"><div class="panel-head"><h2>核心入口</h2><button class="secondary" onclick="loadOverview()">刷新</button></div><div class="route-list" id="entryList"></div></div><div class="panel"><h2>系统报告</h2><div class="actions"><button onclick="generateShowcaseReport()">生成系统报告</button><button class="secondary" onclick="loadShowcaseReport()">读取最新报告</button><button class="secondary" onclick="listShowcaseReports()">报告列表</button></div><pre id="reportBox">暂无报告</pre></div></section>
<section class="grid-2"><div class="panel"><h2>安全能力</h2><div id="featureList" class="route-list"></div></div><div class="panel"><h2>原始状态</h2><pre id="rawBox">加载中</pre></div></section>
</main>
<script>
const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : window.location.origin;
function normalizePath(path){ if(!path) return "/"; path=String(path).split("#")[0].split("?")[0]; if(path.length>1 && path.endsWith("/")) path=path.slice(0,-1); return path || "/"; }
function escapeHtml(value){return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}
function pretty(data){return JSON.stringify(data,null,2)}
function setText(id,value){const el=document.getElementById(id); if(el) el.textContent=value ?? "-";}
function setHtml(id,value){const el=document.getElementById(id); if(el) el.innerHTML=value ?? "";}
function setJson(id,value){const el=document.getElementById(id); if(el) el.textContent=pretty(value)}
function badge(text,type){const t=String(type||text||"").toLowerCase();let c=""; if(t.includes("allow")||t.includes("pass")||t.includes("valid")||t.includes("ok")||t.includes("true")) c="pass"; else if(t.includes("deny")||t.includes("fail")||t.includes("invalid")||t.includes("false")) c="deny"; else if(t.includes("confirm")||t.includes("pending")||t.includes("warn")) c="confirm"; return `<span class="badge ${c}">${escapeHtml(text||"-")}</span>`}
async function fetchText(path, options={}){ const response=await fetch(API_BASE+path, options); const text=await response.text(); if(!response.ok) throw new Error(text || `HTTP ${response.status}`); return text; }
async function fetchJson(path, options={}){ const response=await fetch(API_BASE+path, options); const text=await response.text(); let data; try{data=text?JSON.parse(text):{}}catch(_){data={raw:text}} if(!response.ok) throw new Error(data.detail||data.message||text||`HTTP ${response.status}`); return data; }
function jsonBody(obj){return {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(obj)}}
function markActiveNav(){ const current=normalizePath(window.location.pathname); document.querySelectorAll(".nav-links a").forEach(link=>{ const href=normalizePath(link.getAttribute("href")||""); link.classList.toggle("active", href===current); });}
function bindTabs(){ document.querySelectorAll("[data-tab-target]").forEach(btn=>{ btn.addEventListener("click",()=>{ const wrap=btn.closest(".panel")||document; wrap.querySelectorAll("[data-tab-target]").forEach(b=>b.classList.remove("active")); wrap.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active")); btn.classList.add("active"); const panel=document.getElementById(btn.dataset.tabTarget); if(panel) panel.classList.add("active"); }); });}
async function checkBackendFromNav(){ const el=document.getElementById("globalBackendStatus"); if(!el) return; el.textContent="检测中"; el.className="nav-status-pill nav-warn"; try{ await fetchJson("/api/status", {cache:"no-store"}); el.textContent="后端运行正常"; el.className="nav-status-pill nav-ok";}catch(e){ el.textContent="后端未连接"; el.className="nav-status-pill nav-bad"; }}
document.addEventListener("DOMContentLoaded",()=>{markActiveNav();bindTabs();checkBackendFromNav(); if(typeof initPage === "function") initPage();});


const entries=[['/','单步授权','自然语言任务、Gateway 直连、语义检测与人工审批'],['/task-chain','任务链','Task Contract、Capability Contract、Runtime Monitor、真实 Agent'],['/tool-proxy','工具接入','外部 Agent 工具调用授权检查'],['/benchmark-dashboard','评测中心','质量门禁、样例报告、完整性与效果评估'],['/security-dashboard','安全中心','系统能力、审计链和安全态势']];
function renderEntries(){setHtml('entryList',entries.map(e=>`<div class="route-row"><strong>${e[1]}</strong><span>${e[2]}</span><a class="btn secondary" href="${e[0]}">打开</a></div>`).join(''))}
async function loadOverview(){renderEntries(); const status=await fetchJson('/api/status'); setText('version',status.version); const sec=await fetchJson('/security/overview'); setText('caseCount',sec.metrics?.total_security_cases); setHtml('featureList',(sec.features||[]).map(f=>`<div class="route-row"><strong>${escapeHtml(f.name)}</strong><span>${escapeHtml(f.description)}</span>${badge(f.enabled?'启用':'缺失',f.enabled?'pass':'fail')}</div>`).join('')); let bench={}; try{bench=await fetchJson('/benchmark/latest');}catch(e){bench={error:String(e)}} const rate=bench.summary?.passed_cases!=null && bench.summary?.total_cases? Math.round(bench.summary.passed_cases/bench.summary.total_cases*1000)/10+'%' : '-'; setText('passRate',rate); let audit={}; try{audit=await fetchJson('/audit/verify'); setText('auditState',audit.valid?'VALID':'CHECK')}catch(e){setText('auditState','-'); audit={error:String(e)}} setJson('rawBox',{status,security:sec,benchmark:bench,audit});}
async function generateShowcaseReport(){setJson('reportBox',await fetchJson('/showcase-report/generate'))}
async function loadShowcaseReport(){setJson('reportBox',await fetchJson('/showcase-report/latest'))}
async function listShowcaseReports(){setJson('reportBox',await fetchJson('/showcase-report/list'))}
function initPage(){loadOverview().catch(e=>setJson('rawBox',{error:String(e)}));}</script>
</body>
</html>
