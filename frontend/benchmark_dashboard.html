<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>量化评测</title><style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#667085;--line:#dfe4ee;--primary:#245bdb;--primary-soft:#eaf0ff;--green:#11875d;--red:#c23535;--amber:#a86500;--shadow:0 12px 30px rgba(21,35,64,.08)}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg);letter-spacing:0}.top-nav{position:sticky;top:0;z-index:50;height:64px;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 28px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand{display:flex;align-items:center;gap:10px;min-width:220px;font-weight:900;white-space:nowrap}.brand-mark{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:var(--primary);color:#fff}.nav-links{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0;overflow-x:auto}.nav-links a{position:relative;flex:0 0 auto;padding:9px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:800;transition:background .18s ease,color .18s ease}.nav-links a:hover{color:var(--primary);background:var(--primary-soft)}.nav-links a.active{color:#fff;background:var(--primary)}.nav-links a.active:after{content:"";position:absolute;left:12px;right:12px;bottom:-12px;height:3px;border-radius:999px;background:var(--primary);animation:navSlide .42s ease both}.transition-label{min-width:132px;text-align:right;color:var(--muted);font-size:12px;white-space:nowrap}.transition-dot{display:inline-block;width:8px;height:8px;margin-right:6px;border-radius:999px;background:var(--green);animation:pulse 1.8s ease infinite}.page-shell{max-width:1220px;margin:0 auto;padding:28px 28px 48px;animation:pageIn .28s ease both}body.page-leaving .page-shell{animation:pageOut .18s ease both}body.page-leaving .transition-dot{background:var(--amber)}.hero{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(280px,.85fr);gap:18px;margin-bottom:18px}.hero-main,.hero-side,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.hero-main{padding:26px}.hero-side{padding:20px}.eyebrow{color:var(--primary);font-size:13px;font-weight:900;margin-bottom:8px}h1{margin:0;font-size:32px;line-height:1.25}h2{margin:0;font-size:20px}h3{margin:0 0 10px;font-size:16px}.subtitle{margin:12px 0 0;color:var(--muted);line-height:1.7}.muted{color:var(--muted)}button,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:9px 14px;border-radius:8px;border:1px solid transparent;background:var(--primary);color:#fff;font-weight:900;font-size:14px;text-decoration:none;cursor:pointer}button.secondary,.btn.secondary{background:#fff;color:var(--primary);border-color:#c8d4ff}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.status-pill,.badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#eef2f8;color:var(--muted)}.ok,.badge.allow,.badge.pass{background:#e8f7ef;color:var(--green)}.warn,.badge.confirm{background:#fff4d8;color:var(--amber)}.bad,.badge.deny,.badge.fail{background:#ffecec;color:var(--red)}.panel{padding:18px;margin-bottom:16px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}.metric{padding:16px;background:#fff;border:1px solid var(--line);border-radius:8px}.metric-label{color:var(--muted);font-size:13px;margin-bottom:8px}.metric-value{font-size:28px;font-weight:900}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-size:13px;font-weight:900;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;font:inherit;background:#fff;color:var(--text)}textarea{min-height:110px;resize:vertical}.route-list{display:grid;gap:10px}.route-row{display:grid;grid-template-columns:120px minmax(0,1fr) 120px;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:8px}.empty,.notice{padding:14px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);background:#fafbff}.notice{border-style:solid;background:#fff4d8;color:#6f4b00;line-height:1.6}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}th{background:#eef3ff;color:#283654;font-size:13px}tr:last-child td{border-bottom:0}pre{margin:0;white-space:pre-wrap;word-break:break-word;max-height:360px;overflow:auto;padding:14px;border-radius:8px;background:#101828;color:#e4e7ec;font:12px/1.55 Consolas,Monaco,monospace}@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes pageOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}@keyframes navSlide{from{transform:scaleX(.25);opacity:.2}to{transform:scaleX(1);opacity:1}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}@media(max-width:980px){.top-nav{height:auto;min-height:64px;align-items:flex-start;flex-direction:column;padding:12px 18px}.brand,.transition-label{min-width:0}.nav-links{width:100%;justify-content:flex-start}.hero,.grid-2,.grid-3{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.page-shell{padding:18px 16px 34px}.metric-grid,.form-grid{grid-template-columns:1fr}.route-row{grid-template-columns:1fr}table{display:block;overflow-x:auto}}
</style></head>
<body><nav class="top-nav"><div class="brand"><div class="brand-mark">AG</div><span>AgentGuard 答辩展示</span></div><div class="nav-links"><a href="/showcase">展示总览</a><a href="/">单步授权</a><a href="/benchmark-dashboard">量化评测</a><a href="/attack-chain-runtime">攻击链</a><a href="/sandbox-dashboard">沙箱运行</a><a href="/security-dashboard">安全总览</a><a href="/authorized-evidence">授权证据</a><a href="/task-chain">任务链</a><a href="/docs">API 文档</a></div><div class="transition-label"><span class="transition-dot"></span>页面切换动画</div></nav><main class="page-shell"><section class="hero"><div class="hero-main"><div class="eyebrow">Quantified Evidence</div><h1>量化评测</h1><p class="subtitle">优先读取后端最新 Benchmark；如果缺少 Result_XXX.json，则自动读取 EvidencePack_036.json 兜底展示。</p></div><aside class="hero-side"><h3>展示状态</h3><div class="status-pill" id="serverStatus">未检测</div><p class="subtitle">顶部导航始终固定，页面切换时只在内容区显示轻量动画。</p><button class="secondary" onclick="checkServer()">检测后端</button></aside></section><div id="notice" class="notice" style="display:none"></div><section class="metric-grid"><div class="metric"><div class="metric-label">样例总数</div><div id="total" class="metric-value">-</div></div><div class="metric"><div class="metric-label">通过率</div><div id="passRate" class="metric-value">-</div></div><div class="metric"><div class="metric-label">攻击缓解率</div><div id="attackRate" class="metric-value">-</div></div><div class="metric"><div class="metric-label">完整性</div><div id="integrity" class="metric-value">-</div></div></section><section class="metric-grid"><div class="metric"><div class="metric-label">阻止危险执行</div><div id="prevented" class="metric-value">-</div></div><div class="metric"><div class="metric-label">正常可用率</div><div id="normalRate" class="metric-value">-</div></div><div class="metric"><div class="metric-label">覆盖评分</div><div id="coverage" class="metric-value">-</div></div><div class="metric"><div class="metric-label">有效性评分</div><div id="effectiveness" class="metric-value">-</div></div></section><section class="panel"><div class="panel-head"><h2>代表案例</h2><button class="secondary" onclick="loadBenchmark()">刷新</button></div><table><thead><tr><th>Case</th><th>类别</th><th>结果</th><th>决策</th><th>摘要</th></tr></thead><tbody id="caseRows"><tr><td colspan="5">加载中</td></tr></tbody></table></section><section class="panel"><div class="panel-head"><h2>完整性证据</h2><button class="secondary" onclick="openEvidence()">打开证据包</button></div><pre id="integrityBox">暂无数据</pre></section></main><script>
const API_BASE=window.location.protocol==='file:'?'http://127.0.0.1:8000':window.location.origin;
function escapeHtml(value){return String(value??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;")}
function pretty(data){return JSON.stringify(data,null,2)}
function badge(text,type){return `<span class="badge ${escapeHtml(type||'')}">${escapeHtml(text||'-')}</span>`}
function pct(value){const n=Number(value);return Number.isFinite(n)?`${Math.round(n*1000)/10}%`:'-'}
async function fetchJson(path,options={}){const response=await fetch(`${API_BASE}${path}`,options);const text=await response.text();let data;try{data=text?JSON.parse(text):{}}catch(_){data={raw:text}}if(!response.ok)throw new Error(data.detail||data.message||text||`HTTP ${response.status}`);return data}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value??'-'}
function setHtml(id,value){const el=document.getElementById(id);if(el)el.innerHTML=value??''}
function setJson(id,value){const el=document.getElementById(id);if(el)el.textContent=pretty(value)}
function markActiveNav(){const path=window.location.pathname;document.querySelectorAll('.nav-links a').forEach(link=>{const href=link.getAttribute('href');link.classList.toggle('active',href===path||(href==='/'&&path==='/'))})}
function bindPageTransitions(){document.querySelectorAll('.nav-links a[href^="/"],a.btn[href^="/"]').forEach(link=>{if(link.target==='_blank')return;link.addEventListener('click',event=>{const href=link.getAttribute('href');if(!href||href===window.location.pathname||href.startsWith('/docs'))return;event.preventDefault();document.body.classList.add('page-leaving');setTimeout(()=>{window.location.href=href},170)})})}
document.addEventListener('DOMContentLoaded',()=>{markActiveNav();bindPageTransitions()});

async function checkServer(){const el=document.getElementById('serverStatus');el.textContent='检测中';el.className='status-pill warn';try{await fetchJson('/api/status');el.textContent='后端运行正常';el.className='status-pill ok'}catch(error){el.textContent='后端未连接';el.className='status-pill bad'}}
async function loadBenchmark(){try{const data=await fetchJson('/benchmark/latest');renderBenchmark(data)}catch(error){document.getElementById('notice').style.display='block';setText('notice','后端最新 Benchmark 不可用，已切换到 EvidencePack_036 兜底展示。'+error);const pack=await fetchJson('/Results/EvidencePack_036.json');renderPack(pack)}}function renderBenchmark(data){const s=data.summary||{};setText('total',s.total);setText('passRate',pct(s.pass_rate));setText('attackRate',`${s.blocked_or_confirmed_attack||0}/${s.attack_case_count||0}`);setText('integrity',s.integrity_valid?'VALID':'CHECK');setText('prevented',s.effectiveness?.prevented_risky_execution_count??'-');setText('normalRate',`${s.normal_available||0}/${s.normal_case_count||0}`);setText('coverage',s.coverage_score??'-');setText('effectiveness',s.effectiveness?.overall_effectiveness_score??'-');renderCases(data.cases||[]);setJson('integrityBox',data.integrity||{})}function renderPack(pack){const e=pack.executive_summary||{},i=pack.integrity||{},c=pack.coverage||{},f=pack.effectiveness||{};setText('total',e.total_cases);setText('passRate',pct(e.pass_rate));setText('attackRate',pct(f.attack_neutralization_rate));setText('integrity',i.valid?'VALID':'CHECK');setText('prevented',f.prevented_risky_execution_count);setText('normalRate',pct(f.normal_availability_rate));setText('coverage',c.coverage_score);setText('effectiveness',f.overall_effectiveness_score);renderCases(pack.representative_cases||[]);setJson('integrityBox',i)}function renderCases(cases){setHtml('caseRows',cases.slice(0,10).map(x=>`<tr><td><strong>${escapeHtml(x.id)}</strong><div class="muted">${escapeHtml(x.description)}</div></td><td>${badge(x.category,x.category)}</td><td>${badge(x.passed?'PASS':'FAIL',x.passed?'pass':'fail')}</td><td>${badge(x.final_decision||x.status,x.final_decision)}</td><td>steps: ${escapeHtml((x.steps||[]).length||x.step_count||'-')}<br>high-risk flows: ${escapeHtml(x.security_graph?.summary?.high_risk_flow_count??x.high_risk_flow_count??0)}</td></tr>`).join('')||'<tr><td colspan="5">暂无案例</td></tr>')}function openEvidence(){window.open('/Results/EvidencePack_036.md','_blank')}loadBenchmark();</script></body></html>
